name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Instalar dependências frontend
        run: npm install
      - name: Validar sincronismo de versão
        run: npm run ci:version
      - name: Typecheck
        run: npm run typecheck
      - name: Build web
        run: npm run build:web

  validate-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Dependências Linux para Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: cargo fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all --check
      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-targets --all-features

  prepare-release:
    needs: [validate-frontend, validate-rust]
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.release_meta.outputs.published }}
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      name: ${{ steps.release_meta.outputs.name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Instalar dependências frontend
        run: npm install
      - name: Semantic release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node ./scripts/release/run-semantic-release.mjs
      - name: Resolver metadados finais da release (com fallback)
        id: release_meta
        run: |
          set -euo pipefail
          if [ "${{ steps.semantic.outputs.published }}" = "true" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "version=${{ steps.semantic.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ steps.semantic.outputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "name=${{ steps.semantic.outputs.name }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="$(tr -d '\n' < VERSION)"
          TAG="v${VERSION}"
          echo "::warning::Semantic release não publicou nova versão. Fallback habilitado para manter geração de binários no merge."
          echo "::notice::Usando versão ${VERSION} e tag ${TAG}."

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::notice::Tag ${TAG} já existe no origin."
          else
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "::notice::Tag ${TAG} criada e enviada para origin."
          fi

          echo "published=true" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=${TAG}" >> "$GITHUB_OUTPUT"

  publish-tauri:
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
      - name: Validar versão x tag de release
        run: node ./scripts/ci/check-version-sync.mjs --tag ${{ needs.prepare-release.outputs.tag }}
      - name: Dependências Linux para Tauri
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Importar certificado Windows
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path certificate | Out-Null
          Set-Content -Path certificate\tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate\tempCert.txt certificate\certificate.pfx
          Remove-Item certificate\tempCert.txt
          $secure = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          Import-PfxCertificate -FilePath certificate\certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $secure
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.args, '--target ') && (contains(matrix.args, 'aarch64-apple-darwin') && 'aarch64-apple-darwin' || contains(matrix.args, 'x86_64-apple-darwin') && 'x86_64-apple-darwin' || '') || '' }}
      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Instalar dependências frontend
        run: npm install
      - name: Detectar modo de build macOS
        if: runner.os == 'macOS'
        run: |
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && [ -n "$KEYCHAIN_PASSWORD" ] && [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::notice::Build macOS com assinatura Apple habilitada."
          else
            echo "::warning::Secrets Apple ausentes. Build macOS seguirá em modo NÃO ASSINADO para manter geração de binários."
          fi
      - name: Publicar binários Tauri
        if: needs.prepare-release.outputs.published == 'true'
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ needs.prepare-release.outputs.tag }}
          releaseName: Integra Desktop v${{ needs.prepare-release.outputs.version }}
          releaseBody: Confira o CHANGELOG.md e os assets desta versão.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}
