name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:

permissions:
  contents: read

jobs:
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Validar título do PR
        run: node ./scripts/ci/validate-pr-title.mjs

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Instalar dependências frontend
        run: npm install
      - name: Validar sincronismo de versão
        run: npm run ci:version
      - name: Typecheck
        run: npm run typecheck
      - name: Build web
        run: npm run build:web

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Dependências Linux para Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: cargo fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all --check
      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-targets --all-features
